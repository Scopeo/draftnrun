name: Lint

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Run Linter and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm exec prettier --check "src/**/*.{ts,vue,js,scss}"

      - name: Run ESLint
        run: pnpm exec eslint . -c .eslintrc.cjs --ext .ts,.js,.cjs,.vue,.tsx,.jsx

      - name: Run Type Check
        run: pnpm typecheck

      - name: Run Unit Tests
        run: pnpm test
