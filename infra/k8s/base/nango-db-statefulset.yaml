apiVersion: v1
kind: Service
metadata:
  name: nango-db
  labels:
    app: nango-db
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: nango-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nango-db
  labels:
    app: nango-db
spec:
  serviceName: nango-db
  replicas: 1
  selector:
    matchLabels:
      app: nango-db
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
  template:
    metadata:
      labels:
        app: nango-db
    spec:
      priorityClassName: ada-high
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:16.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "nango"
            - name: POSTGRES_PASSWORD
              value: "nango"
            - name: POSTGRES_DB
              value: "nango"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U nango
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U nango
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
