apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nango-server
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: ada-staging-nango-security@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - nango-staging.scopeo.studio
      secretName: nango-tls
  rules:
    - host: nango-staging.scopeo.studio
      http:
        paths:
          # OAuth callback endpoint - MUST be public for OAuth providers to redirect
          - path: /oauth/callback
            pathType: Prefix
            backend:
              service:
                name: nango-server
                port:
                  number: 3003
          # OAuth connect endpoint - needed for headless flow
          - path: /oauth/connect
            pathType: Prefix
            backend:
              service:
                name: nango-server
                port:
                  number: 3003
          # Health check endpoint - for monitoring
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nango-server
                port:
                  number: 3003
