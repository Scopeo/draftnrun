name: Reset K8s Staging to Main

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main (to get migration files list)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get main branch migration revisions and head
        id: migrations
        run: |
          python3 << 'PYEOF'
          import ast, os

          versions_dir = "ada_backend/database/alembic/versions"
          revisions = set()
          down_revisions = set()

          for f in os.listdir(versions_dir):
              if not f.endswith(".py"):
                  continue
              with open(os.path.join(versions_dir, f)) as fp:
                  tree = ast.parse(fp.read())
              for node in ast.walk(tree):
                  if isinstance(node, ast.AnnAssign) and isinstance(node.target, ast.Name):
                      if node.target.id == "revision" and isinstance(node.value, ast.Constant):
                          revisions.add(node.value.value)
                      elif node.target.id == "down_revision" and isinstance(node.value, ast.Constant):
                          down_revisions.add(node.value.value)
                  elif isinstance(node, ast.Assign):
                      for target in node.targets:
                          if isinstance(target, ast.Name) and isinstance(node.value, ast.Constant):
                              if target.id == "revision":
                                  revisions.add(node.value.value)
                              elif target.id == "down_revision":
                                  down_revisions.add(node.value.value)

          heads = revisions - down_revisions
          rev_str = " ".join(sorted(revisions))
          head_str = " ".join(sorted(heads))

          print(f"Main revisions ({len(revisions)}): {rev_str}")
          print(f"Main heads: {head_str}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"revisions={rev_str}\n")
              gh.write(f"head={head_str}\n")
          PYEOF

      - name: Auto-downgrade migrations before reset
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            MAIN_REVISIONS=" ${{ steps.migrations.outputs.revisions }} "
            MAIN_HEAD="${{ steps.migrations.outputs.head }}"

            echo "📊 Current Alembic revision:"
            kubectl exec deployment/ada-api -n ada-staging -- \
              alembic -c ada_backend/database/alembic.ini current || echo "No running pod"

            CURRENT_REV=$(kubectl exec deployment/ada-api -n ada-staging -- \
              alembic -c ada_backend/database/alembic.ini current 2>/dev/null \
              | awk 'NF{print $1; exit}' || true)

            if [ -z "$CURRENT_REV" ]; then
              echo "📊 No current revision found, skipping downgrade"
            else
              case " $MAIN_REVISIONS " in
                *" $CURRENT_REV "*)
                  echo "✅ Current revision $CURRENT_REV exists in main, no downgrade needed"
                  ;;
                *)
                  if [ -z "$MAIN_HEAD" ]; then
                    echo "❌ Current revision $CURRENT_REV not in main, but could not determine main HEAD"
                    exit 1
                  fi
                  TARGET=$(echo "$MAIN_HEAD" | awk '{print $1}')
                  echo "⬇️ Current revision $CURRENT_REV not in main, downgrading to main HEAD $TARGET..."
                  kubectl exec deployment/ada-api -n ada-staging -- \
                    alembic -c ada_backend/database/alembic.ini downgrade "$TARGET"
                  echo "📊 Post-downgrade revision:"
                  kubectl exec deployment/ada-api -n ada-staging -- \
                    alembic -c ada_backend/database/alembic.ini current || true
                  ;;
              esac
            fi

      - name: Deploy with existing main image (no rebuild!)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e
            REGISTRY="${{ env.REGISTRY }}"
            PREFIX=$(echo "${{ env.IMAGE_PREFIX }}" | tr '[:upper:]' '[:lower:]')

            echo "🚀 Deploying with :latest tag (existing image, no rebuild)"

            # Use the :latest tagged images (built on last push to main)
            kubectl set image deployment/ada-api -n ada-staging \
              ada-api=${REGISTRY}/${PREFIX}-api:latest
            kubectl set image deployment/ada-ingestion-worker -n ada-staging \
              ada-ingestion-worker=${REGISTRY}/${PREFIX}-worker:latest
            kubectl set image deployment/ada-webhook-worker -n ada-staging \
              ada-webhook-worker=${REGISTRY}/${PREFIX}-webhook-worker:latest
            kubectl set image deployment/ada-scheduler -n ada-staging \
              ada-scheduler=${REGISTRY}/${PREFIX}-scheduler:latest

            echo "⏳ Waiting for API rollout..."
            kubectl rollout status deployment/ada-api -n ada-staging --timeout=10m

      - name: Run migrations and seed
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "🗄️ Running migrations and seed..."
            kubectl exec deployment/ada-api -n ada-staging -- \
              sh -c "alembic -c ada_backend/database/alembic.ini upgrade head && python -m ada_backend.database.seed_db"

      - name: Wait for all rollouts
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            echo "⏳ Waiting for worker, webhook-worker, and scheduler..."
            kubectl rollout status deployment/ada-ingestion-worker -n ada-staging --timeout=10m
            kubectl rollout status deployment/ada-webhook-worker -n ada-staging --timeout=10m
            kubectl rollout status deployment/ada-scheduler -n ada-staging --timeout=10m

            echo "✅ K8s deployment complete!"
            kubectl get pods -n ada-staging

      - name: Reset staging branch to main
        run: |
          echo "🔀 Resetting staging branch to main..."
          git fetch origin main staging
          git checkout staging
          git reset --hard origin/main
          git push --force origin staging
          echo "✅ Staging branch reset to main (push uses GITHUB_TOKEN, won't trigger workflows)"
