name: Sync Prod DB to Staging

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force full data + Qdrant sync even if TTL cache is valid"
        required: false
        default: false
        type: boolean

jobs:
  sync-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync databases
        id: sync_db
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e
            NS="ada-staging"
            STATE_FILE="/tmp/ada-sync-status-${{ github.run_id }}.txt"
            JOB_NAME="db-sync-${{ github.run_id }}"

            IMAGE=$(kubectl get deployment/ada-api -n ${NS} -o jsonpath='{.spec.template.spec.containers[0].image}')
            echo "🔍 Running DB sync as Kubernetes Job using image: ${IMAGE}"

            FORCE_SYNC_FLAG=""
            if [ "${{ inputs.force_sync }}" = "true" ]; then
              FORCE_SYNC_FLAG="--force-sync"
            fi

            kubectl create job ${JOB_NAME} -n ${NS} \
              --image=${IMAGE} \
              -- bash -c "\
                export PATH=/app/.venv/bin:\$PATH && \
                export PYTHONPATH=/app && \
                cd /app && \
                ./scripts/copy_data/sync_data.sh \
                  --source-db-url '${{ secrets.PROD_DB_URL }}' \
                  --source-ingestion-db-url '${{ secrets.PROD_INGESTION_DB_URL }}' \
                  --target-db-url '${{ secrets.STAGING_DB_URL }}' \
                  --target-ingestion-db-url '${{ secrets.STAGING_INGESTION_DB_URL }}' \
                  --skip-qdrant \
                  ${FORCE_SYNC_FLAG} \
              "

            echo "⏳ Waiting for DB sync job to complete..."
            if kubectl wait --for=condition=complete job/${JOB_NAME} -n ${NS} --timeout=15m 2>/dev/null; then
              echo "📋 Checking job logs..."
              LOGS=$(kubectl logs job/${JOB_NAME} -n ${NS})
              echo "$LOGS"

              FORCE_SYNC="${{ inputs.force_sync }}"
              if [ "$FORCE_SYNC" = "true" ]; then
                echo "✅ DB sync completed (force_sync was requested)"
                echo "SYNCED" > "$STATE_FILE"
                kubectl delete job ${JOB_NAME} -n ${NS}
                exit 0
              fi
              if echo "$LOGS" | grep -qi "skip\|cache.*valid\|already.*synced"; then
                echo "⏭️ DB sync not needed - TTL cache is valid"
                echo "SKIPPED" > "$STATE_FILE"
                kubectl delete job ${JOB_NAME} -n ${NS}
                exit 0
              else
                echo "✅ DB sync completed successfully"
                echo "SYNCED" > "$STATE_FILE"
                kubectl delete job ${JOB_NAME} -n ${NS}
                exit 0
              fi
            else
              echo "❌ DB sync job failed"
              echo "📋 Job logs:"
              kubectl logs job/${JOB_NAME} -n ${NS} || true
              echo "FAILED" > "$STATE_FILE"
              kubectl delete job ${JOB_NAME} -n ${NS} || true
              exit 1
            fi

      - name: Sync Qdrant collections
        id: sync_qdrant
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -eo pipefail
            NS="ada-staging"
            STATE_FILE="/tmp/ada-sync-status-${{ github.run_id }}.txt"

            if [ -f "$STATE_FILE" ] && [ "$(cat "$STATE_FILE")" != "SYNCED" ]; then
              echo "⏭️ Skipping Qdrant sync - DB sync was not performed (status: $(cat "$STATE_FILE"))"
              exit 0
            fi

            SOURCE_URL="${{ secrets.PROD_QDRANT_CLUSTER_URL }}"
            SOURCE_KEY="${{ secrets.PROD_QDRANT_API_KEY }}"
            TARGET_URL="${{ secrets.STAGING_QDRANT_CLUSTER_URL }}"
            TARGET_KEY="${{ secrets.STAGING_QDRANT_API_KEY }}"
            SECRET_NAME="qdrant-migration-keys-${{ github.run_id }}"

            trap 'kubectl delete secret "${SECRET_NAME}" -n "${NS}" --ignore-not-found 2>/dev/null || true' EXIT

            SOURCE_GRPC=$(echo "$SOURCE_URL" | sed -E 's/:[0-9]+$//')":6334"
            TARGET_GRPC=$(echo "$TARGET_URL" | sed -E 's/:[0-9]+$//')":6334"

            COLLECTIONS=$(curl -sf -H "api-key: ${SOURCE_KEY}" "${SOURCE_URL}/collections" | jq -r '.result.collections[].name')
            if [ -z "$COLLECTIONS" ]; then
              echo "No collections found in source, nothing to migrate"
              exit 0
            fi
            TOTAL=$(echo "$COLLECTIONS" | wc -l | tr -d ' ')
            echo "🔍 Migrating ${TOTAL} collections via qdrant-migration (gRPC)"

            kubectl create secret generic "${SECRET_NAME}" -n "${NS}" \
              --from-literal=SOURCE_KEY="${SOURCE_KEY}" \
              --from-literal=TARGET_KEY="${TARGET_KEY}" \
              --dry-run=client -o yaml | kubectl apply -f -

            FAIL_COUNT=0
            IDX=0
            for COLLECTION in $COLLECTIONS; do
              IDX=$((IDX + 1))
              HASH=$(echo -n "$COLLECTION" | md5sum | head -c 8)
              JOB_NAME="qm-${HASH}-${{ github.run_id }}"

              echo "[${IDX}/${TOTAL}] ${COLLECTION}"
              kubectl delete job "${JOB_NAME}" -n "${NS}" --ignore-not-found 2>/dev/null || true

              kubectl apply -n "${NS}" -f - <<EOF
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: ${JOB_NAME}
            spec:
              backoffLimit: 0
              activeDeadlineSeconds: 600
              template:
                spec:
                  restartPolicy: Never
                  containers:
                  - name: migrate
                    image: registry.cloud.qdrant.io/library/qdrant-migration
                    env:
                    - name: SOURCE_KEY
                      valueFrom:
                        secretKeyRef:
                          name: ${SECRET_NAME}
                          key: SOURCE_KEY
                    - name: TARGET_KEY
                      valueFrom:
                        secretKeyRef:
                          name: ${SECRET_NAME}
                          key: TARGET_KEY
                    args:
                    - "qdrant"
                    - "--source.url=${SOURCE_GRPC}"
                    - "--source.api-key=\$(SOURCE_KEY)"
                    - "--source.collection=${COLLECTION}"
                    - "--target.url=${TARGET_GRPC}"
                    - "--target.api-key=\$(TARGET_KEY)"
                    - "--target.collection=${COLLECTION}"
                    - "--migration.batch-size=512"
                    - "--migration.restart"
            EOF

              ELAPSED=0
              JOB_RESULT=""
              while [ $ELAPSED -lt 600 ]; do
                SUCCEEDED=$(kubectl get job "${JOB_NAME}" -n "${NS}" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
                JOB_FAILED=$(kubectl get job "${JOB_NAME}" -n "${NS}" -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
                if [ "$SUCCEEDED" = "1" ]; then
                  JOB_RESULT="ok"
                  break
                fi
                if [ -n "$JOB_FAILED" ] && [ "$JOB_FAILED" != "0" ]; then
                  JOB_RESULT="failed"
                  break
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              if [ "$JOB_RESULT" = "ok" ]; then
                echo "  ✅ Done"
              elif [ "$JOB_RESULT" = "failed" ]; then
                echo "  ❌ Failed"
                kubectl logs "job/${JOB_NAME}" -n "${NS}" --tail=20 2>/dev/null || true
                FAIL_COUNT=$((FAIL_COUNT + 1))
              else
                echo "  ⏰ Timed out"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              fi

              kubectl delete job "${JOB_NAME}" -n "${NS}" --ignore-not-found 2>/dev/null || true
            done

            echo ""
            echo "Qdrant migration: $((TOTAL - FAIL_COUNT))/${TOTAL} succeeded"
            if [ $FAIL_COUNT -gt 0 ]; then
              echo "❌ ${FAIL_COUNT} collection(s) failed"
              exit 1
            fi

      - name: Save replica counts and scale down pods
        if: success()
        id: scale_down
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            NS="ada-staging"
            STATE_FILE="/tmp/ada-sync-status-${{ github.run_id }}.txt"
            REPLICA_FILE="/tmp/ada-sync-replicas-${{ github.run_id }}.txt"
            
            # Skip scale down if sync was skipped
            if [ -f "$STATE_FILE" ] && [ "$(cat "$STATE_FILE")" = "SKIPPED" ]; then
              echo "⏭️ Skipping scale down - sync was not needed"
              exit 0
            fi
            
            # Save current replica counts
            echo "💾 Saving current replica counts..."
            kubectl get deployment -n ${NS} -o json | \
              jq -r '.items[] | "\(.metadata.name)=\(.spec.replicas)"' > "$REPLICA_FILE"
            
            cat "$REPLICA_FILE"
            
            # Scale down with error handling
            echo "⬇️ Scaling down all deployments..."
            if ! kubectl scale deployment --all -n ${NS} --replicas=0; then
              echo "❌ Failed to scale down deployments"
              rm -f "$REPLICA_FILE"
              exit 1
            fi
            
            kubectl wait --for=delete pod -l app -n ${NS} --timeout=300s || {
              echo "⚠️ Warning: Some pods did not terminate within timeout"
            }

      - name: Run migrations and seed as Jobs
        if: success()
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e
            NS="ada-staging"
            STATE_FILE="/tmp/ada-sync-status-${{ github.run_id }}.txt"
            
            # Skip migrations if sync was skipped (sync step already writes SYNCED when force_sync is true)
            if [ -f "$STATE_FILE" ] && [ "$(cat "$STATE_FILE")" = "SKIPPED" ]; then
              echo "⏭️ Skipping migrations - sync was not performed"
              exit 0
            fi

            echo "🗄️ Running migrations as Kubernetes Job..."
            kubectl create job db-migrate -n ${NS} \
              --from=deployment/ada-api \
              -- alembic -c ada_backend/database/alembic.ini upgrade head

            kubectl wait --for=condition=complete job/db-migrate -n ${NS} --timeout=300s
            kubectl delete job db-migrate -n ${NS}

            echo "🌱 Running seed as Kubernetes Job..."
            kubectl create job db-seed -n ${NS} \
              --from=deployment/ada-api \
              -- python -m ada_backend.database.seed_db

            kubectl wait --for=condition=complete job/db-seed -n ${NS} --timeout=300s
            kubectl delete job db-seed -n ${NS}

            echo "✅ Database migrations and seed complete!"

      - name: Scale up pods to original replica counts
        if: always()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_K8S_STAGING }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            NS="ada-staging"
            STATE_FILE="/tmp/ada-sync-status-${{ github.run_id }}.txt"
            REPLICA_FILE="/tmp/ada-sync-replicas-${{ github.run_id }}.txt"
            
            # No scale up needed if sync was skipped (sync step already writes SYNCED when force_sync is true)
            if [ -f "$STATE_FILE" ] && [ "$(cat "$STATE_FILE")" = "SKIPPED" ]; then
              echo "⏭️ No scale up needed - sync was skipped, pods never scaled down"
              rm -f "$STATE_FILE" /tmp/sync-output.log
              exit 0
            fi
            
            # Scale up was needed (sync happened)
            if [ ! -f "$REPLICA_FILE" ]; then
              echo "⚠️ Warning: Replica state file not found, using defaults"
              kubectl scale deployment/ada-api -n ${NS} --replicas=1 || true
              kubectl scale deployment/ada-ingestion-worker -n ${NS} --replicas=1 || true
              kubectl scale deployment/ada-webhook-worker -n ${NS} --replicas=1 || true
              kubectl scale deployment/ada-scheduler -n ${NS} --replicas=1 || true
            else
              echo "⬆️ Scaling back to original replica counts..."
              while IFS='=' read -r deployment replicas; do
                echo "Scaling ${deployment} to ${replicas} replicas"
                kubectl scale deployment/${deployment} -n ${NS} --replicas=${replicas} || true
              done < "$REPLICA_FILE"
              
              # Cleanup state files
              rm -f "$REPLICA_FILE" "$STATE_FILE" /tmp/sync-output.log
            fi
            
            echo "✅ Pods scaled back up!"
